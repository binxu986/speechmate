name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # Host Unit Tests (excluding slow tests that need model download)
  host-unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: host

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: host/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests
        run: |
          pytest tests/ -v -m "not slow" --cov=app --cov=models --cov-report=xml --cov-report=term

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: host/coverage.xml
          flags: host-unit

  # Host Integration Tests (requires model download)
  host-integration-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: host

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Download ASR model
        run: |
          python download_model.py --model tiny

      - name: Run integration tests
        run: |
          pytest tests/ -v -m "slow" --cov=app --cov=models --cov-report=xml
        continue-on-error: true

  # Client Unit Tests
  client-unit-tests:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pydantic python-dotenv loguru pyyaml requests pytest pytest-cov
          pip install numpy
          pip install sounddevice --only-binary :all: || echo "sounddevice optional"

      - name: Run client tests
        run: |
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term || pytest tests/ -v
        continue-on-error: true

  # Coverage Report
  coverage:
    runs-on: ubuntu-latest
    needs: [host-unit-tests]
    if: always()

    steps:
      - name: Generate coverage summary
        run: |
          echo "## Test Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Host unit tests completed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Client tests completed" >> $GITHUB_STEP_SUMMARY
