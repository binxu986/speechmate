# SpeechMate Host Server - Docker Compose
# Usage: docker-compose up -d

version: '3.8'

services:
  speechmate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: speechmate-host
    ports:
      - "8000:8000"  # API Server
      - "5000:5000"  # Web Admin
    volumes:
      # Persist data
      - ./data:/app/data
      - ./logs:/app/logs
      - ./model_cache:/app/model_cache
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - WEB_HOST=0.0.0.0
      - WEB_PORT=5000
      - DEBUG=false
      - LOG_LEVEL=INFO
      # Override these in .env or here
      # - ADMIN_API_KEY=your-key
      # - JWT_SECRET=your-secret
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

